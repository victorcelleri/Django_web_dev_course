{% extends "base.html" %}

{% block titulo %}Inicio — {{ nombre_docente }}{% endblock %}

{% block contenido %}
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-primary">{{ nombre_docente }}</h1>
        <p class="lead text-muted">Docente de {{ materia }} &middot; {{ institucion }}</p>
        <blockquote class="blockquote mt-3">
            <p class="mb-0 fst-italic">&ldquo;{{ frase_mision }}&rdquo;</p>
        </blockquote>
        <div class="mt-4">
            <a href="{% url 'recursos' %}" class="btn btn-primary me-2">Ver Recursos &rarr;</a>
            <a href="{% url 'acerca' %}" class="btn btn-outline-primary">Acerca de mí</a>
        </div>
    </div>
</div>
{% endblock %}
